<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --bg2: #ede8e0;
    --surface: #ffffff;
    --surface2: #faf7f4;
    --border: #e0d9d0;
    --border2: #cfc8be;
    --text: #1a1714;
    --text2: #4a4540;
    --muted: #8a847c;
    --accent: #c96442;
    --accent-light: #f5e8e2;
    --accent2: #9b6b4a;
    --accent3: #5c7a6b;
    --shadow: rgba(60,40,20,0.08);
    --shadow-lg: rgba(60,40,20,0.13);
  }

  /* ── DARK MODE THEME ── */
  body.dark {
    --bg: #18160f;
    --bg2: #211e15;
    --surface: #26221a;
    --surface2: #2e2a20;
    --border: #38332a;
    --border2: #4a4438;
    --text: #f0ebe3;
    --text2: #b8b0a4;
    --muted: #7a7268;
    --accent: #d4714e;
    --accent-light: rgba(212,113,78,0.15);
    --shadow: rgba(0,0,0,0.3);
    --shadow-lg: rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s ease, color 0.3s ease;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(201,100,66,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 90% 100%, rgba(92,122,107,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    transition: background-image 0.3s ease;
  }
  body.dark::before {
    background-image:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(212,113,78,0.09) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 90% 100%, rgba(92,122,107,0.07) 0%, transparent 50%);
  }

  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 44px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s ease, border-color 0.3s ease;
  }
  body.dark header { background: rgba(24,22,15,0.85); }

  .logo {
    font-family: 'Lora', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
    text-decoration: none;
    white-space: nowrap;
    letter-spacing: -0.1px;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 1px 3px rgba(201,100,66,0.3); }
  .btn-primary:hover { background: #b85838; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,100,66,0.3); }
  .btn-outline { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); box-shadow: 0 1px 2px var(--shadow); }
  .btn-outline:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: #fff0ee; color: #c0392b; border: 1px solid #f5c6c2; }
  .btn-danger:hover { background: #ffe4e0; }
  body.dark .btn-danger { background: rgba(192,57,43,0.15); color: #e57373; border-color: rgba(192,57,43,0.3); }
  body.dark .btn-danger:hover { background: rgba(192,57,43,0.25); }
  body.dark .ic-btn.del:hover { background: rgba(192,57,43,0.18); color: #e57373; border-color: rgba(192,57,43,0.4); }
  .btn-editing { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(201,100,66,0.25); }
  .btn-editing:hover { background: #f0ddd6; }
  .btn-sm { padding: 6px 13px; font-size: 12.5px; }

  main {
    position: relative;
    z-index: 1;
    padding: 52px 44px 100px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .page-header { margin-bottom: 40px; }
  .page-title {
    font-family: 'Lora', serif;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .page-title em { font-style: italic; color: var(--accent); }
  .page-sub { font-size: 14px; color: var(--muted); }

  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 32px; }
  .bc-item { cursor: pointer; transition: color 0.15s; }
  .bc-item:hover { color: var(--accent); }
  .bc-item.active { color: var(--text); pointer-events: none; font-weight: 500; }
  .bc-sep { opacity: 0.5; font-size: 11px; }

  .section-bar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; }

  /* CLIENT GRID */
  .clients-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
    gap: 14px;
  }

  .client-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 22px 20px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 1px 3px var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 130px;
    overflow: hidden;
  }
  .client-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-color, var(--accent));
    border-radius: 14px 14px 0 0;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .client-card:hover { transform: translateY(-3px); box-shadow: 0 10px 32px var(--shadow-lg); border-color: var(--border2); }
  .client-card:hover::after { opacity: 1; }

  .client-icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    background: var(--card-color, var(--accent));
    color: #fff;
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .client-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; flex: 1; }
  .client-count { font-size: 12px; color: var(--muted); }

  .card-controls {
    position: absolute;
    top: 10px; right: 10px;
    display: flex; gap: 4px;
    opacity: 0; transition: opacity 0.15s; z-index: 3;
  }
  .edit-mode .client-card:hover .card-controls,
  .edit-mode .link-card:hover .card-controls { opacity: 1; }

  .ic-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ic-btn:hover { color: var(--text); border-color: var(--border2); }
  .ic-btn.del:hover { color: #c0392b; border-color: #f5c6c2; background: #fff0ee; }

  .add-card {
    border: 1.5px dashed var(--border2);
    border-radius: 14px;
    padding: 24px 22px;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13.5px; font-weight: 500;
    transition: all 0.2s;
    min-height: 130px;
    background: transparent;
  }
  .add-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .add-circle {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: transform 0.2s;
  }
  .add-card:hover .add-circle { transform: scale(1.1) rotate(90deg); }

  /* LINKS GRID */
  .links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(172px, 1fr));
    gap: 12px;
  }

  .link-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 18px 16px;
    transition: all 0.18s ease;
    box-shadow: 0 1px 3px var(--shadow);
    display: flex; flex-direction: column; gap: 6px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
  }
  .link-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--link-bg, #f5e8e2) 0%, transparent 65%);
    opacity: 0; transition: opacity 0.2s;
    border-radius: 12px; pointer-events: none;
  }
  .link-card:hover::before { opacity: 1; }
  .link-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow-lg); border-color: var(--link-color, var(--accent)); }

  .link-name {
    font-size: 14.5px; font-weight: 600; color: var(--text);
    transition: color 0.15s;
    display: block; position: relative; z-index: 1;
  }
  .link-card:hover .link-name { color: var(--link-color, var(--accent)); }
  /* Invisible full-card click overlay */
  .link-card-overlay {
    position: absolute; inset: 0; z-index: 2;
  }
  .edit-mode .link-card-overlay { display: none; }
  .link-url { font-size: 11.5px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; position: relative; z-index: 1; }
  .link-arrow { font-size: 16px; color: var(--link-color, var(--accent)); opacity: 0; transition: all 0.15s; align-self: flex-end; margin-top: 4px; position: relative; z-index: 1; }
  .link-card:hover .link-arrow { opacity: 1; transform: translate(2px, -2px); }

  .add-link-card {
    border: 1.5px dashed var(--border2);
    border-radius: 12px; padding: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    color: var(--muted); font-size: 13px; font-weight: 500;
    transition: all 0.18s; min-height: 80px; background: transparent;
  }
  .add-link-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .empty { grid-column: 1 / -1; text-align: center; padding: 64px 20px; color: var(--muted); }
  .empty-icon { font-size: 44px; margin-bottom: 14px; }
  .empty-title { font-family: 'Lora', serif; font-size: 18px; color: var(--text2); margin-bottom: 6px; }
  .empty-desc { font-size: 14px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,23,20,0.35);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.22s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 36px;
    width: 100%; max-width: 440px;
    transform: scale(0.96) translateY(8px);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 40px 80px rgba(60,40,20,0.18);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; margin-bottom: 24px; color: var(--text); }

  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
  input[type="text"], input[type="url"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 11px 14px;
    color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.18s, box-shadow 0.18s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,100,66,0.1); }
  input::placeholder { color: var(--muted); }

  .color-row { display: flex; gap: 9px; flex-wrap: wrap; }
  .swatch { width: 30px; height: 30px; border-radius: 7px; cursor: pointer; border: 2.5px solid transparent; transition: transform 0.15s, border-color 0.15s; }
  .swatch:hover { transform: scale(1.18); }
  .swatch.selected { border-color: var(--text); }

  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 28px; }

  .edit-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent-light); color: var(--accent);
    border: 1px solid rgba(201,100,66,0.2);
    border-radius: 20px; padding: 4px 12px 4px 8px;
    font-size: 12.5px; font-weight: 600;
  }
  .blink { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.35; } }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--text); color: #fff;
    padding: 11px 22px; border-radius: 10px;
    font-size: 13.5px; opacity: 0; transition: all 0.28s ease;
    z-index: 200; box-shadow: 0 16px 40px rgba(60,40,20,0.25); font-weight: 500;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── FOOTER ── */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }

  .footer-btn {
    pointer-events: all;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 2px 8px var(--shadow);
    white-space: nowrap;
  }
  .footer-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .footer-btn .fbicon { font-size: 15px; line-height: 1; }

  /* hidden import input */
  #importInput { display: none; }

  @keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: up 0.32s ease both; }
  .client-card, .link-card { animation: up 0.3s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span>Client Hub</div>
  <div class="header-right">
    <div id="editPill" class="edit-pill" style="display:none"><span class="blink"></span> Editing</div>
    <button class="btn btn-outline" id="backBtn" onclick="goHome()" style="display:none">← All Clients</button>
    <button class="btn btn-outline" id="editBtn" onclick="toggleEdit()">✏ Edit</button>
  </div>
</header>

<main id="main">
  <div id="homeView" class="fade-up">
    <div class="page-header">
      <div class="page-title">Your <em>Clients</em></div>
      <div class="page-sub" id="clientSub">—</div>
    </div>
    <div class="clients-grid" id="clientsGrid"></div>
  </div>

  <div id="clientView" style="display:none">
    <div class="breadcrumb">
      <span class="bc-item" onclick="goHome()">All Clients</span>
      <span class="bc-sep">›</span>
      <span class="bc-item active" id="bcName"></span>
    </div>
    <div class="section-bar">
      <div>
        <div class="page-title" id="cvTitle"></div>
        <div class="page-sub" id="linkSub"></div>
      </div>
      <div id="clientDelBtn" style="display:none">
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentClient()">Delete Client</button>
      </div>
    </div>
    <div class="links-grid" id="linksGrid"></div>
  </div>
</main>

<!-- Client Modal -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <div class="modal-title" id="cmTitle">Add Client</div>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="cmName" placeholder="e.g. Acme Corp">
    </div>
    <div class="form-group">
      <label>Colour</label>
      <div class="color-row" id="cmColors"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('clientModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()">Save</button>
    </div>
  </div>
</div>

<!-- Link Modal -->
<div class="modal-overlay" id="linkModal">
  <div class="modal">
    <div class="modal-title" id="lmTitle">Add Link</div>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="lmName" placeholder="e.g. Gmail, Dashboard">
    </div>
    <div class="form-group">
      <label>URL</label>
      <input type="url" id="lmUrl" placeholder="https://...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('linkModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveLink()">Save</button>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <button class="footer-btn" id="darkBtn" onclick="toggleDark()" title="Toggle dark mode">
    <span class="fbicon" id="darkIcon">🌙</span> <span id="darkLabel">Dark mode</span>
  </button>
  <button class="footer-btn" onclick="exportData()" title="Export your data as a JSON file">
    <span class="fbicon">⬇</span> Export
  </button>
  <button class="footer-btn" onclick="document.getElementById('importInput').click()" title="Import a previously exported JSON file">
    <span class="fbicon">⬆</span> Import
  </button>
  <input type="file" id="importInput" accept=".json,application/json" onchange="importData(event)">
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#c96442','#9b6b4a','#5c7a6b','#7a6b9b','#6b8a9b','#9b8a5c','#7a4a6b','#4a7a5c','#9b4a4a','#5c6b9b'];
const PALETTES = [
  {color:'#c96442',bg:'#f5e8e2'},{color:'#5c7a6b',bg:'#e6f0ec'},
  {color:'#7a6b9b',bg:'#ece8f5'},{color:'#9b6b4a',bg:'#f5ece4'},
  {color:'#6b8a9b',bg:'#e4ecf0'},{color:'#9b8a5c',bg:'#f5f0e4'},
];

let db = JSON.parse(localStorage.getItem('chub3') || 'null') || { clients: [] };
let editMode = false, currentId = null, editingCid = null, editingLid = null, linkClientId = null;

function save() { localStorage.setItem('chub3', JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

function render() { currentId ? renderClient() : renderHome(); }

function renderHome() {
  document.getElementById('homeView').style.display = '';
  document.getElementById('clientView').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  const n = db.clients.length;
  document.getElementById('clientSub').textContent = n === 0 ? 'No clients added yet' : `${n} client${n!==1?'s':''}`;
  const grid = document.getElementById('clientsGrid');
  grid.innerHTML = '';
  db.clients.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'client-card';
    div.style.setProperty('--card-color', c.color);
    div.style.animationDelay = `${i*0.045}s`;
    div.innerHTML = `
      <div class="card-controls">
        <button class="ic-btn" onclick="event.stopPropagation();openEditClient('${c.id}')" title="Edit">✏</button>
        <button class="ic-btn del" onclick="event.stopPropagation();deleteClient('${c.id}')" title="Delete">✕</button>
      </div>
      <div class="client-icon">${c.name[0].toUpperCase()}</div>
      <div class="client-name">${esc(c.name)}</div>
      <div class="client-count">${c.links.length} link${c.links.length!==1?'s':''}</div>`;
    div.onclick = () => openClient(c.id);
    grid.appendChild(div);
  });
  if (editMode) {
    const add = document.createElement('div');
    add.className = 'add-card';
    add.innerHTML = `<div class="add-circle">+</div><span>Add Client</span>`;
    add.onclick = openAddClient;
    grid.appendChild(add);
  } else if (n === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No clients yet</div><p class="empty-desc">Click <strong>Edit</strong> to add your first client.</p></div>`;
  }
}

function renderClient() {
  const c = db.clients.find(x => x.id === currentId);
  if (!c) { goHome(); return; }
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('clientView').style.display = '';
  document.getElementById('backBtn').style.display = '';
  document.getElementById('bcName').textContent = c.name;
  document.getElementById('cvTitle').innerHTML = `<em>${esc(c.name)}</em>`;
  document.getElementById('linkSub').textContent = `${c.links.length} link${c.links.length!==1?'s':''}`;
  document.getElementById('clientDelBtn').style.display = editMode ? '' : 'none';
  const grid = document.getElementById('linksGrid');
  grid.innerHTML = '';
  c.links.forEach((l, i) => {
    const pal = PALETTES[i % PALETTES.length];
    const div = document.createElement('div');
    div.className = 'link-card';
    div.style.setProperty('--link-color', pal.color);
    div.style.setProperty('--link-bg', pal.bg);
    div.style.animationDelay = `${i*0.04}s`;
    div.innerHTML = `
      <a class="link-card-overlay" href="${esc(l.url)}" target="_blank" rel="noopener"></a>
      <div class="card-controls">
        <button class="ic-btn" onclick="event.stopPropagation();openEditLink('${c.id}','${l.id}')" title="Edit">✏</button>
        <button class="ic-btn del" onclick="event.stopPropagation();deleteLink('${c.id}','${l.id}')" title="Delete">✕</button>
      </div>
      <div class="link-name">${esc(l.name)}</div>
      <div class="link-url">${esc(l.url)}</div>
      <div class="link-arrow">↗</div>`;
    grid.appendChild(div);
  });
  if (editMode) {
    const add = document.createElement('div');
    add.className = 'add-link-card';
    add.innerHTML = `<span style="font-size:18px;line-height:1">+</span> Add Link`;
    add.onclick = () => openAddLink(c.id);
    grid.appendChild(add);
  } else if (c.links.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔗</div><div class="empty-title">No links yet</div><p class="empty-desc">Enable edit mode to add links.</p></div>`;
  }
}

function goHome() { currentId = null; render(); }
function openClient(id) { currentId = id; render(); }

function toggleEdit() {
  editMode = !editMode;
  document.getElementById('editBtn').textContent = editMode ? '✓ Done' : '✏ Edit';
  document.getElementById('editBtn').className = editMode ? 'btn btn-editing' : 'btn btn-outline';
  document.getElementById('editPill').style.display = editMode ? 'inline-flex' : 'none';
  document.body.classList.toggle('edit-mode', editMode);
  render();
}

function buildSwatches(sel) {
  const wrap = document.getElementById('cmColors');
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (c === sel ? ' selected' : '');
    s.style.background = c;
    s.dataset.c = c;
    s.onclick = () => { wrap.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected')); s.classList.add('selected'); };
    wrap.appendChild(s);
  });
}

function openAddClient() {
  editingCid = null;
  document.getElementById('cmTitle').textContent = 'Add Client';
  document.getElementById('cmName').value = '';
  buildSwatches(COLORS[0]);
  openModal('clientModal');
}

function openEditClient(id) {
  editingCid = id;
  const c = db.clients.find(x => x.id === id);
  document.getElementById('cmTitle').textContent = 'Edit Client';
  document.getElementById('cmName').value = c.name;
  buildSwatches(c.color);
  openModal('clientModal');
}

function saveClient() {
  const name = document.getElementById('cmName').value.trim();
  if (!name) { document.getElementById('cmName').focus(); return; }
  const color = document.querySelector('.swatch.selected')?.dataset.c || COLORS[0];
  if (editingCid) {
    const c = db.clients.find(x => x.id === editingCid);
    c.name = name; c.color = color; toast('Client updated');
  } else {
    db.clients.push({ id: uid(), name, color, links: [] }); toast('Client added');
  }
  save(); closeModal('clientModal'); render();
}

function deleteClient(id) {
  if (!confirm('Delete this client and all their links?')) return;
  db.clients = db.clients.filter(c => c.id !== id);
  save(); toast('Client deleted'); render();
}

function deleteCurrentClient() {
  if (!confirm('Delete this client and all their links?')) return;
  db.clients = db.clients.filter(c => c.id !== currentId);
  save(); toast('Client deleted'); goHome();
}

function openAddLink(cid) {
  linkClientId = cid; editingLid = null;
  document.getElementById('lmTitle').textContent = 'Add Link';
  document.getElementById('lmName').value = '';
  document.getElementById('lmUrl').value = '';
  openModal('linkModal');
}

function openEditLink(cid, lid) {
  linkClientId = cid; editingLid = lid;
  const c = db.clients.find(x => x.id === cid);
  const l = c.links.find(x => x.id === lid);
  document.getElementById('lmTitle').textContent = 'Edit Link';
  document.getElementById('lmName').value = l.name;
  document.getElementById('lmUrl').value = l.url;
  openModal('linkModal');
}

function saveLink() {
  const name = document.getElementById('lmName').value.trim();
  let url = document.getElementById('lmUrl').value.trim();
  if (!name || !url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const c = db.clients.find(x => x.id === linkClientId);
  if (editingLid) {
    const l = c.links.find(x => x.id === editingLid);
    l.name = name; l.url = url; toast('Link updated');
  } else {
    c.links.push({ id: uid(), name, url }); toast('Link added');
  }
  save(); closeModal('linkModal'); render();
}

function deleteLink(cid, lid) {
  const c = db.clients.find(x => x.id === cid);
  c.links = c.links.filter(l => l.id !== lid);
  save(); toast('Link removed'); render();
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  setTimeout(() => document.querySelector(`#${id} input`)?.focus(), 200);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);
document.getElementById('cmName').addEventListener('keydown', e => { if (e.key === 'Enter') saveClient(); });
document.getElementById('lmUrl').addEventListener('keydown', e => { if (e.key === 'Enter') saveLink(); });

/* ── DARK MODE ── */
let darkMode = localStorage.getItem('chub-dark') === '1';
function applyDark() {
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('darkIcon').textContent = darkMode ? '☀️' : '🌙';
  document.getElementById('darkLabel').textContent = darkMode ? 'Light mode' : 'Dark mode';
}
function toggleDark() {
  darkMode = !darkMode;
  localStorage.setItem('chub-dark', darkMode ? '1' : '0');
  applyDark();
}
applyDark();

/* ── EXPORT ── */
function exportData() {
  const json = JSON.stringify(db, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'clienthub-export.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Data exported!');
}

/* ── IMPORT ── */
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed.clients || !Array.isArray(parsed.clients)) throw new Error();
      if (!confirm(`Replace current data with ${parsed.clients.length} client(s) from file?`)) return;
      db = parsed; save(); render();
      toast('Data imported successfully!');
    } catch { alert('Could not read file. Make sure it is a valid Client Hub export.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

render();
</script>
</body>
</html>
