<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='13' fill='%23c96442'/></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clients</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0eb;--bg2:#ede8e0;--surface:#fff;--surface2:#faf7f4;--border:#e0d9d0;--border2:#cfc8be;--text:#1a1714;--text2:#4a4540;--muted:#8a847c;--accent:#c96442;--accent-light:#f5e8e2;--shadow:rgba(60,40,20,0.08);--shadow-lg:rgba(60,40,20,0.13);--danger:#c0392b;--danger-bg:#fff0ee;}
body.dark{--bg:#18160f;--bg2:#211e15;--surface:#26221a;--surface2:#2e2a20;--border:#38332a;--border2:#4a4438;--text:#f0ebe3;--text2:#b8b0a4;--muted:#7a7268;--accent:#d4714e;--accent-light:rgba(212,113,78,0.15);--shadow:rgba(0,0,0,0.3);--shadow-lg:rgba(0,0,0,0.5);--danger-bg:rgba(192,57,43,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(201,100,66,.07) 0%,transparent 55%),radial-gradient(ellipse 50% 60% at 90% 100%,rgba(92,122,107,.06) 0%,transparent 50%);}
body.dark::before{background-image:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(212,113,78,.09) 0%,transparent 55%),radial-gradient(ellipse 50% 60% at 90% 100%,rgba(92,122,107,.07) 0%,transparent 50%);}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:20px 44px;background:rgba(255,255,255,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:background .3s;}
body.dark header{background:rgba(24,22,15,.85);}
.logo{font-family:'Lora',serif;font-size:20px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:10px;}
.dark-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;}
.dark-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-wrap{position:relative;z-index:100;}
.nav-trigger{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:9px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;user-select:none;}
.nav-trigger:hover,.nav-trigger.open{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.nav-trigger-chevron{font-size:9px;opacity:.6;transition:transform .2s;}
.nav-trigger.open .nav-trigger-chevron{transform:rotate(180deg);}
.nav-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border2);border-radius:13px;box-shadow:0 8px 32px var(--shadow-lg);min-width:200px;z-index:200;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-6px) scale(.98);transition:opacity .18s,transform .18s;transform-origin:top right;}
.nav-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.nav-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:10px 14px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;color:var(--text2);text-decoration:none;font-size:13.5px;font-weight:500;transition:background .12s,color .12s;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{color:var(--accent);background:var(--accent-light);font-weight:600;}
.nav-item-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
main{position:relative;z-index:1;padding:52px 44px 100px;max-width:1000px;margin:0 auto;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
.page-title{font-family:'Lora',serif;font-size:32px;font-weight:600;letter-spacing:-.5px;margin-bottom:6px;}
.page-title em{color:var(--accent);font-style:italic;font-weight:400;}
.page-sub{font-size:14px;color:var(--muted);}
.page-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .18s;text-decoration:none;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(201,100,66,.3);}
.btn-primary:hover{background:#b85838;transform:translateY(-1px);}
.btn-outline{background:var(--surface);color:var(--text2);border:1px solid var(--border2);}
.btn-outline:hover{background:var(--surface2);color:var(--text);border-color:var(--accent);}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid #f5c6c2;}
.btn-danger:hover{filter:brightness(.95);}
body.dark .btn-danger{border-color:rgba(192,57,43,.3);}
.btn-sm{padding:5px 12px;font-size:12px;}
.search-wrap{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .18s;max-width:360px;margin-bottom:24px;}
.search-wrap:focus-within{border-color:var(--accent);}
.search-icon{padding:0 10px 0 14px;color:var(--muted);display:flex;align-items:center;flex-shrink:0;}
.search-input{flex:1;background:transparent;border:none;outline:none;padding:11px 0;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13.5px;}
.search-input::placeholder{color:var(--muted);}
.search-clear{background:none;border:none;padding:0 12px;color:var(--muted);cursor:pointer;font-size:13px;}
.search-clear:hover{color:var(--text);}
.clients-list{display:flex;flex-direction:column;gap:14px;}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px var(--shadow);transition:box-shadow .2s;}
.client-card:hover{box-shadow:0 4px 20px var(--shadow-lg);}
.client-card-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;user-select:none;transition:background .15s;}
.client-card-header:hover{background:var(--surface2);}
.client-color-bar{width:4px;height:36px;border-radius:3px;flex-shrink:0;}
.client-card-info{flex:1;min-width:0;}
.client-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;}
.client-meta{font-size:12.5px;color:var(--muted);}
.client-card-actions{display:flex;gap:6px;flex-shrink:0;}
.chevron{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.client-card.open .chevron{transform:rotate(180deg);}
.client-card-body{display:none;border-top:1px solid var(--border);}
.client-card.open .client-card-body{display:block;}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;background:var(--surface2);}
.tab-btn{padding:11px 16px;font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;padding:20px;}
.tab-panel.active{display:block;}
.contacts-grid,.addresses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.contact-card,.address-card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:14px 16px;}
.contact-name,.address-label-text{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.contact-role,.address-label{font-size:12px;color:var(--muted);margin-bottom:8px;}
.contact-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;background:var(--surface);border:1px solid var(--border2);color:var(--text2);text-decoration:none;transition:all .15s;}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.contact-actions,.address-actions{display:flex;gap:6px;margin-top:8px;}
.notes-area{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;}
.add-dashed-btn{width:100%;padding:14px;border:1.5px dashed var(--border2);border-radius:11px;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;}
.add-dashed-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,.4);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .22s;padding:20px;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(60,40,20,.18);transform:scale(.96) translateY(8px);transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.modal-overlay.show .modal{transform:scale(1) translateY(0);}
.modal h3{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:22px;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.modal-field input,.modal-field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 13px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;transition:border-color .18s;resize:vertical;}
.modal-field input:focus,.modal-field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,100,66,.1);}
.modal-field input::placeholder,.modal-field textarea::placeholder{color:var(--border2);}
.modal-field textarea{min-height:90px;line-height:1.6;}
.modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end;}
.btn-cancel{padding:9px 17px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-cancel:hover{background:var(--surface2);}
.btn-confirm{padding:9px 17px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;}
.btn-confirm:hover{background:#b85838;}
.color-options{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.color-opt{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2.5px solid transparent;transition:transform .15s,border-color .15s;}
.color-opt:hover{transform:scale(1.12);}
.color-opt.selected{border-color:var(--text);}
.empty{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:48px;opacity:.3;margin-bottom:14px;}
.empty-title{font-family:'Lora',serif;font-size:22px;color:var(--text2);margin-bottom:8px;}
.empty-desc{font-size:14px;max-width:300px;margin:0 auto 24px;line-height:1.6;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);color:#fff;padding:11px 22px;border-radius:10px;font-size:13.5px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(60,40,20,.25);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;}
@media(max-width:640px){header{padding:16px 20px;}main{padding:32px 20px 80px;}.modal-2col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html"><span class="logo-dot"></span>home.</a>
  <div class="header-right">
    <div class="nav-wrap" id="navWrap">
      <button class="nav-trigger" id="navTrigger" onclick="toggleNav()">☰ Menu <span class="nav-trigger-chevron">▼</span></button>
      <div class="nav-dropdown" id="navDropdown">
        <div class="nav-section-label">Pages</div>
        <a class="nav-item" href="index.html"><span class="nav-item-icon">🏠</span>home.</a>
        <a class="nav-item" href="reports.html"><span class="nav-item-icon">📊</span>Reports</a>
        <a class="nav-item active" href="clients.html"><span class="nav-item-icon">🏢</span>Clients</a>
        <a class="nav-item" href="dns.html"><span class="nav-item-icon">🔍</span>DNS Lookup</a>
        <a class="nav-item" href="imgconvert.html"><span class="nav-item-icon">🖼</span>Image Converter</a>
        <a class="nav-item" href="assets.html"><span class="nav-item-icon">📋</span>Asset Register</a>
      </div>
    </div>
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
  </div>
</header>

<main>
  <div class="page-header">
    <div>
      <div class="page-title">Client <em>Information</em></div>
      <div class="page-sub" id="pageSub">—</div>
    </div>
    <div class="page-actions">
      <button class="btn btn-outline btn-sm" onclick="exportData()">↓ Export</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">↑ Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-primary" onclick="openAddClient()">+ Add Client</button>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search clients, contacts…" oninput="onSearch(this.value)" autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
  </div>
  <div class="clients-list" id="clientsList"></div>
</main>

<!-- Client Modal -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <h3 id="clientModalTitle">New Client</h3>
    <div class="modal-2col">
      <div class="modal-field"><label>Client Name</label><input type="text" id="cName" placeholder="e.g. Acme Corp"></div>
      <div class="modal-field"><label>Industry</label><input type="text" id="cIndustry" placeholder="e.g. Technology"></div>
    </div>
    <div class="modal-field"><label>Website</label><input type="url" id="cWebsite" placeholder="https://"></div>
    <div class="modal-field"><label>Notes</label><textarea id="cNotes" placeholder="Internal notes…"></textarea></div>
    <div class="modal-field"><label>Colour</label><div class="color-options" id="clientColorOpts"></div></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('clientModal')">Cancel</button>
      <button class="btn-confirm" id="clientModalBtn" onclick="saveClient()">Add Client</button>
    </div>
  </div>
</div>

<!-- Contact Modal -->
<div class="modal-overlay" id="contactModal">
  <div class="modal">
    <h3 id="contactModalTitle">New Contact</h3>
    <div class="modal-2col">
      <div class="modal-field"><label>Name</label><input type="text" id="ctName" placeholder="Full name"></div>
      <div class="modal-field"><label>Role / Title</label><input type="text" id="ctRole" placeholder="e.g. IT Manager"></div>
    </div>
    <div class="modal-2col">
      <div class="modal-field"><label>Email</label><input type="email" id="ctEmail" placeholder="name@company.com"></div>
      <div class="modal-field"><label>Phone</label><input type="tel" id="ctPhone" placeholder="+61 2 1234 5678"></div>
    </div>
    <div class="modal-2col">
      <div class="modal-field"><label>Mobile</label><input type="tel" id="ctMobile" placeholder="+61 4xx xxx xxx"></div>
      <div class="modal-field"><label>Department</label><input type="text" id="ctDept" placeholder="e.g. IT, Finance"></div>
    </div>
    <div class="modal-field"><label>Notes</label><textarea id="ctNotes" placeholder="Notes…" style="min-height:60px"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('contactModal')">Cancel</button>
      <button class="btn-confirm" id="contactModalBtn" onclick="saveContact()">Add Contact</button>
    </div>
  </div>
</div>

<!-- Address Modal -->
<div class="modal-overlay" id="addressModal">
  <div class="modal">
    <h3 id="addressModalTitle">New Address</h3>
    <div class="modal-2col">
      <div class="modal-field"><label>Label</label><input type="text" id="adLabel" placeholder="e.g. Head Office"></div>
      <div class="modal-field"><label>Country</label><input type="text" id="adCountry" placeholder="Australia"></div>
    </div>
    <div class="modal-field"><label>Street Address</label><input type="text" id="adStreet" placeholder="123 Main Street"></div>
    <div class="modal-2col">
      <div class="modal-field"><label>City / Suburb</label><input type="text" id="adCity" placeholder="Sydney"></div>
      <div class="modal-field"><label>State</label><input type="text" id="adState" placeholder="NSW"></div>
    </div>
    <div class="modal-field"><label>Postcode</label><input type="text" id="adPostcode" placeholder="2000"></div>
    <div class="modal-field"><label>Notes</label><textarea id="adNotes" placeholder="Notes…" style="min-height:60px"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addressModal')">Cancel</button>
      <button class="btn-confirm" id="addressModalBtn" onclick="saveAddress()">Add Address</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='ci_v2';
const COLORS=['#c96442','#9b6b4a','#5c7a6b','#7a6b9b','#6b8a9b','#9b8a5c','#7a4a6b','#4a7a5c','#bf6e42','#6b9b7a'];
let data=[];
try{data=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){}
let searchQuery='',editingClient=null,editingContact=null,editingAddress=null,activeClientId=null,selectedColor=COLORS[0];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function save(){localStorage.setItem(KEY,JSON.stringify(data));syncColors();}

function syncColors(){
  const map={};
  data.forEach(c=>{if(c.name&&c.color)map[c.name]=c.color;});
  localStorage.setItem('chub_colors',JSON.stringify(map));
}

function render(){
  const sub=document.getElementById('pageSub');
  sub.textContent=data.length?`${data.length} client${data.length!==1?'s':''}`:'No clients yet';
  document.getElementById('searchClear').style.display=searchQuery?'block':'none';
  let filtered=data;
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    filtered=data.filter(c=>
      c.name.toLowerCase().includes(q)||(c.industry||'').toLowerCase().includes(q)||
      (c.contacts||[]).some(ct=>ct.name.toLowerCase().includes(q)||(ct.email||'').toLowerCase().includes(q))||
      (c.addresses||[]).some(a=>(a.city||'').toLowerCase().includes(q)||(a.street||'').toLowerCase().includes(q))
    );
  }
  const list=document.getElementById('clientsList');
  list.innerHTML='';
  if(!data.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🏢</div><div class="empty-title">No clients yet</div><div class="empty-desc">Add your first client to get started.</div><button class="btn btn-primary" onclick="openAddClient()">+ Add Client</button></div>`;
    return;
  }
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-title">No results</div><div class="empty-desc">Nothing matched your search.</div></div>`;
    return;
  }
  filtered.forEach(client=>{
    const isOpen=client._open;
    const activeTab=client._tab||'contacts';
    const contacts=client.contacts||[];
    const addresses=client.addresses||[];
    const card=document.createElement('div');
    card.className='client-card'+(isOpen?' open':'');
    card.id='cc_'+client.id;

    const ctCards=contacts.map(ct=>`
      <div class="contact-card">
        <div class="contact-name">${esc(ct.name)}</div>
        <div class="contact-role">${esc(ct.role||'')}</div>
        <div class="contact-chips">
          ${ct.email?`<a class="chip" href="mailto:${esc(ct.email)}">✉ ${esc(ct.email)}</a>`:''}
          ${ct.phone?`<a class="chip" href="tel:${esc(ct.phone)}">📞 ${esc(ct.phone)}</a>`:''}
          ${ct.mobile?`<a class="chip" href="tel:${esc(ct.mobile)}">📱 ${esc(ct.mobile)}</a>`:''}
          ${ct.dept?`<span class="chip">🏷 ${esc(ct.dept)}</span>`:''}
        </div>
        ${ct.notes?`<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${esc(ct.notes)}</div>`:''}
        <div class="contact-actions">
          <button class="btn btn-outline btn-sm" onclick="openEditContact('${client.id}','${ct.id}')">✏ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteContact('${client.id}','${ct.id}')">✕</button>
        </div>
      </div>`).join('');

    const addrCards=addresses.map(a=>{
      const parts=[a.street,a.city,a.state,a.postcode,a.country].filter(Boolean).join(', ');
      const mapsUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(parts)}`;
      return `<div class="address-card">
        <div class="address-label">${esc(a.label||'Address')}</div>
        <div class="address-label-text">${esc(parts)||'No details'}</div>
        ${a.notes?`<div style="font-size:12px;color:var(--muted);margin-bottom:4px">${esc(a.notes)}</div>`:''}
        <div class="address-actions">
          ${parts?`<a class="btn btn-outline btn-sm" href="${mapsUrl}" target="_blank">📍 Maps</a>`:''}
          <button class="btn btn-outline btn-sm" onclick="openEditAddress('${client.id}','${a.id}')">✏ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAddress('${client.id}','${a.id}')">✕</button>
        </div>
      </div>`;}).join('');

    card.innerHTML=`
      <div class="client-card-header" onclick="toggleCard('${client.id}')">
        <div class="client-color-bar" style="background:${client.color||COLORS[0]}"></div>
        <div class="client-card-info">
          <div class="client-name">${esc(client.name)}</div>
          <div class="client-meta">${esc(client.industry||'')}${client.website?` · <a href="${esc(client.website)}" target="_blank" style="color:var(--accent);text-decoration:none" onclick="event.stopPropagation()">${esc(client.website.replace(/^https?:\/\//,''))}</a>`:''}${contacts.length?` · ${contacts.length} contact${contacts.length!==1?'s':''}`:''}</div>
        </div>
        <div class="client-card-actions" onclick="event.stopPropagation()">
          <button class="btn btn-outline btn-sm" onclick="openEditClient('${client.id}')">✏ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteClient('${client.id}')">✕</button>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="client-card-body">
        <div class="tabs">
          <button class="tab-btn${activeTab==='contacts'?' active':''}" onclick="switchTab('${client.id}','contacts')">Contacts${contacts.length?` <span style="opacity:.55;font-size:11px">(${contacts.length})</span>`:''}</button>
          <button class="tab-btn${activeTab==='addresses'?' active':''}" onclick="switchTab('${client.id}','addresses')">Addresses${addresses.length?` <span style="opacity:.55;font-size:11px">(${addresses.length})</span>`:''}</button>
          <button class="tab-btn${activeTab==='notes'?' active':''}" onclick="switchTab('${client.id}','notes')">Notes</button>
        </div>
        <div class="tab-panel${activeTab==='contacts'?' active':''}" data-panel="contacts">
          <div class="contacts-grid">${ctCards}<button class="add-dashed-btn" onclick="openAddContact('${client.id}')">+ Add Contact</button></div>
        </div>
        <div class="tab-panel${activeTab==='addresses'?' active':''}" data-panel="addresses">
          <div class="addresses-grid">${addrCards}<button class="add-dashed-btn" onclick="openAddAddress('${client.id}')">+ Add Address</button></div>
        </div>
        <div class="tab-panel${activeTab==='notes'?' active':''}" data-panel="notes">
          <div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button class="btn btn-outline btn-sm" onclick="openEditClient('${client.id}')">✏ Edit Notes</button></div>
          <div class="notes-area">${client.notes?esc(client.notes):'<span style="color:var(--muted);font-style:italic">No notes added yet.</span>'}</div>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

function toggleCard(id){const c=data.find(x=>x.id===id);if(c){c._open=!c._open;save();render();}}
function switchTab(cid,tab){const c=data.find(x=>x.id===cid);if(c){c._tab=tab;save();render();}}
function onSearch(q){searchQuery=q;render();}
function clearSearch(){searchQuery='';document.getElementById('searchInput').value='';render();}

function openAddClient(){
  editingClient=null;selectedColor=COLORS[0];
  document.getElementById('clientModalTitle').textContent='New Client';
  document.getElementById('clientModalBtn').textContent='Add Client';
  ['cName','cIndustry','cWebsite','cNotes'].forEach(id=>document.getElementById(id).value='');
  buildColorOpts('clientColorOpts');openModal('clientModal');
}
function openEditClient(id){
  const c=data.find(x=>x.id===id);if(!c)return;
  editingClient=id;selectedColor=c.color||COLORS[0];
  document.getElementById('clientModalTitle').textContent='Edit Client';
  document.getElementById('clientModalBtn').textContent='Save Changes';
  document.getElementById('cName').value=c.name;
  document.getElementById('cIndustry').value=c.industry||'';
  document.getElementById('cWebsite').value=c.website||'';
  document.getElementById('cNotes').value=c.notes||'';
  buildColorOpts('clientColorOpts');openModal('clientModal');
}
function saveClient(){
  const name=document.getElementById('cName').value.trim();
  if(!name){alert('Client name is required.');return;}
  const fields={name,industry:document.getElementById('cIndustry').value.trim(),website:document.getElementById('cWebsite').value.trim(),notes:document.getElementById('cNotes').value.trim(),color:selectedColor};
  if(editingClient){Object.assign(data.find(x=>x.id===editingClient),fields);toast('Client updated');}
  else{data.push({id:uid(),contacts:[],addresses:[],_open:true,_tab:'contacts',...fields});toast('Client added');}
  save();render();closeModal('clientModal');
}
function deleteClient(id){
  const c=data.find(x=>x.id===id);if(!c)return;
  if(!confirm(`Delete "${c.name}" and all their data?`))return;
  data=data.filter(x=>x.id!==id);save();render();toast('Deleted');
}

function openAddContact(cid){
  editingContact=null;activeClientId=cid;
  document.getElementById('contactModalTitle').textContent='New Contact';
  document.getElementById('contactModalBtn').textContent='Add Contact';
  ['ctName','ctRole','ctEmail','ctPhone','ctMobile','ctDept','ctNotes'].forEach(id=>document.getElementById(id).value='');
  openModal('contactModal');
}
function openEditContact(cid,ctid){
  const c=data.find(x=>x.id===cid);if(!c)return;
  const ct=(c.contacts||[]).find(x=>x.id===ctid);if(!ct)return;
  editingContact=ctid;activeClientId=cid;
  document.getElementById('contactModalTitle').textContent='Edit Contact';
  document.getElementById('contactModalBtn').textContent='Save Changes';
  document.getElementById('ctName').value=ct.name||'';
  document.getElementById('ctRole').value=ct.role||'';
  document.getElementById('ctEmail').value=ct.email||'';
  document.getElementById('ctPhone').value=ct.phone||'';
  document.getElementById('ctMobile').value=ct.mobile||'';
  document.getElementById('ctDept').value=ct.dept||'';
  document.getElementById('ctNotes').value=ct.notes||'';
  openModal('contactModal');
}
function saveContact(){
  const name=document.getElementById('ctName').value.trim();
  if(!name){alert('Contact name is required.');return;}
  const c=data.find(x=>x.id===activeClientId);if(!c)return;
  if(!c.contacts)c.contacts=[];
  const fields={name,role:document.getElementById('ctRole').value.trim(),email:document.getElementById('ctEmail').value.trim(),phone:document.getElementById('ctPhone').value.trim(),mobile:document.getElementById('ctMobile').value.trim(),dept:document.getElementById('ctDept').value.trim(),notes:document.getElementById('ctNotes').value.trim()};
  if(editingContact){Object.assign(c.contacts.find(x=>x.id===editingContact),fields);toast('Contact updated');}
  else{c.contacts.push({id:uid(),...fields});toast('Contact added');}
  save();render();closeModal('contactModal');
}
function deleteContact(cid,ctid){
  const c=data.find(x=>x.id===cid);if(!c)return;
  const ct=(c.contacts||[]).find(x=>x.id===ctid);
  if(!ct||!confirm(`Delete "${ct.name}"?`))return;
  c.contacts=c.contacts.filter(x=>x.id!==ctid);save();render();toast('Contact deleted');
}

function openAddAddress(cid){
  editingAddress=null;activeClientId=cid;
  document.getElementById('addressModalTitle').textContent='New Address';
  document.getElementById('addressModalBtn').textContent='Add Address';
  ['adLabel','adStreet','adCity','adState','adPostcode','adNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('adCountry').value='Australia';
  openModal('addressModal');
}
function openEditAddress(cid,aid){
  const c=data.find(x=>x.id===cid);if(!c)return;
  const a=(c.addresses||[]).find(x=>x.id===aid);if(!a)return;
  editingAddress=aid;activeClientId=cid;
  document.getElementById('addressModalTitle').textContent='Edit Address';
  document.getElementById('addressModalBtn').textContent='Save Changes';
  document.getElementById('adLabel').value=a.label||'';
  document.getElementById('adStreet').value=a.street||'';
  document.getElementById('adCity').value=a.city||'';
  document.getElementById('adState').value=a.state||'';
  document.getElementById('adPostcode').value=a.postcode||'';
  document.getElementById('adCountry').value=a.country||'Australia';
  document.getElementById('adNotes').value=a.notes||'';
  openModal('addressModal');
}
function saveAddress(){
  const c=data.find(x=>x.id===activeClientId);if(!c)return;
  if(!c.addresses)c.addresses=[];
  const fields={label:document.getElementById('adLabel').value.trim()||'Address',street:document.getElementById('adStreet').value.trim(),city:document.getElementById('adCity').value.trim(),state:document.getElementById('adState').value.trim(),postcode:document.getElementById('adPostcode').value.trim(),country:document.getElementById('adCountry').value.trim(),notes:document.getElementById('adNotes').value.trim()};
  if(editingAddress){Object.assign(c.addresses.find(x=>x.id===editingAddress),fields);toast('Address updated');}
  else{c.addresses.push({id:uid(),...fields});toast('Address added');}
  save();render();closeModal('addressModal');
}
function deleteAddress(cid,aid){
  const c=data.find(x=>x.id===cid);if(!c)return;
  const a=(c.addresses||[]).find(x=>x.id===aid);
  if(!a||!confirm('Delete this address?'))return;
  c.addresses=c.addresses.filter(x=>x.id!==aid);save();render();toast('Address deleted');
}

function buildColorOpts(containerId){
  document.getElementById(containerId).innerHTML=COLORS.map(c=>
    `<div class="color-opt${c===selectedColor?' selected':''}" style="background:${c}" onclick="pickColor('${c}',this,'${containerId}')"></div>`
  ).join('');
}
function pickColor(c,el,containerId){
  selectedColor=c;
  document.querySelectorAll('#'+containerId+' .color-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
}

function exportData(){
  if(!data.length){toast('No clients to export');return;}
  const blob=new Blob([JSON.stringify({version:'2.0',exportedAt:new Date().toISOString(),clients:data},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a'),d=new Date();
  a.href=url;a.download=`clients-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('✓ Exported');
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const imported=parsed.clients||parsed;
      if(!Array.isArray(imported))throw new Error();
      if(!confirm(`Import ${imported.length} client(s)? This will replace current data.`))return;
      data=imported;save();render();toast(`✓ Imported ${imported.length} client(s)`);
    }catch{toast('✗ Invalid file');}
    event.target.value='';
  };
  reader.readAsText(file);
}

function openModal(id){document.getElementById(id).classList.add('show');setTimeout(()=>{const i=document.querySelector('#'+id+' input');if(i)i.focus();},100);}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)closeModal(o.id);}));
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.show').forEach(o=>closeModal(o.id));});

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background='var(--accent)';
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);t._t=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(10px)';},2800);
}

function toggleNav(){const t=document.getElementById('navTrigger'),d=document.getElementById('navDropdown');const o=d.classList.toggle('open');t.classList.toggle('open',o);}
document.addEventListener('click',e=>{const w=document.getElementById('navWrap');if(w&&!w.contains(e.target)){document.getElementById('navDropdown').classList.remove('open');document.getElementById('navTrigger').classList.remove('open');}});

let darkMode=localStorage.getItem('chub-dark')==='1';
function applyDark(){document.body.classList.toggle('dark',darkMode);document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';}
function toggleDark(){darkMode=!darkMode;localStorage.setItem('chub-dark',darkMode?'1':'0');applyDark();}
applyDark();
render();
</script>
</body>
</html>
