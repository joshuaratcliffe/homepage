<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNS Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0eb; --bg2:#ede8e0; --surface:#fff; --surface2:#faf7f4;
  --border:#e0d9d0; --border2:#cfc8be; --text:#1a1714; --text2:#4a4540;
  --muted:#8a847c; --accent:#c96442; --accent-light:#f5e8e2;
  --shadow:rgba(60,40,20,0.08); --shadow-lg:rgba(60,40,20,0.13);
  --green:#3d7a5c; --green-bg:rgba(61,122,92,0.1);
  --amber:#9b8a5c;
  --mono:'JetBrains Mono',monospace;
}
body.dark {
  --bg:#18160f; --bg2:#211e15; --surface:#26221a; --surface2:#2e2a20;
  --border:#38332a; --border2:#4a4438; --text:#f0ebe3; --text2:#b8b0a4;
  --muted:#7a7268; --accent:#d4714e; --accent-light:rgba(212,113,78,0.15);
  --shadow:rgba(0,0,0,0.3); --shadow-lg:rgba(0,0,0,0.5);
  --green:#4a6b5c; --green-bg:rgba(74,107,92,0.18);
  --amber:#7a6b4a;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; transition:background .3s,color .3s; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: radial-gradient(ellipse 70% 50% at 10% 0%,rgba(201,100,66,.07) 0%,transparent 55%), radial-gradient(ellipse 50% 60% at 90% 100%,rgba(92,122,107,.06) 0%,transparent 50%); }
body.dark::before { background-image: radial-gradient(ellipse 70% 50% at 10% 0%,rgba(212,113,78,.09) 0%,transparent 55%), radial-gradient(ellipse 50% 60% at 90% 100%,rgba(92,122,107,.07) 0%,transparent 50%); }

/* ── HEADER ── */
header { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:20px 44px; background:rgba(255,255,255,.8); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); transition:background .3s,border-color .3s; }
body.dark header { background:rgba(24,22,15,.85); }
.logo { font-family:'Lora',serif; font-size:20px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:9px; text-decoration:none; }
.logo-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); flex-shrink:0; }
.header-right { display:flex; align-items:center; gap:10px; }
.nav-link { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; border:1px solid var(--border2); background:var(--surface2); color:var(--text2); font-size:13px; font-weight:500; text-decoration:none; transition:all .15s; }
.nav-link:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
.dark-btn { width:36px; height:36px; border-radius:8px; border:1px solid var(--border2); background:var(--surface2); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .15s; }
.dark-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── MAIN ── */
main { position:relative; z-index:1; padding:52px 44px 100px; max-width:900px; margin:0 auto; }

.page-title { font-family:'Lora',serif; font-size:32px; font-weight:600; letter-spacing:-.5px; margin-bottom:6px; }
.page-title em { color:var(--accent); font-style:italic; font-weight:400; }
.page-sub { font-size:14px; color:var(--muted); margin-bottom:36px; }

/* ── SEARCH BAR ── */
.search-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 1px 3px var(--shadow); margin-bottom:20px; }
.input-row { display:flex; gap:10px; }
.domain-input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:13px 16px; font-size:15px;
  font-family:var(--mono); color:var(--text); outline:none;
  transition:border-color .18s, box-shadow .18s;
}
.domain-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,100,66,.1); }
.domain-input::placeholder { color:var(--muted); font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; }
.lookup-btn {
  padding:13px 22px; background:var(--accent); color:#fff; border:none;
  border-radius:10px; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px;
  font-weight:600; cursor:pointer; transition:all .18s; white-space:nowrap;
  box-shadow:0 1px 3px rgba(201,100,66,.3);
}
.lookup-btn:hover { background:#b85838; transform:translateY(-1px); }
.lookup-btn:active { transform:translateY(0); }
.lookup-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* ── RECORD TYPE BUTTONS ── */
.record-types { display:flex; flex-wrap:wrap; gap:8px; margin-top:16px; }
.type-btn {
  padding:7px 16px; border-radius:8px; border:1px solid var(--border2);
  background:var(--surface2); color:var(--text2);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .15s;
  display:flex; align-items:center; gap:6px;
}
.type-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
.type-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 1px 4px rgba(201,100,66,.3); }
.type-btn .type-dot { width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.6; }

/* ── RESULTS ── */
.results-area { display:flex; flex-direction:column; gap:14px; }

.result-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; overflow:hidden;
  box-shadow:0 1px 3px var(--shadow);
  animation:fadeUp .25s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

.result-header {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px; border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.result-type-badge {
  font-family:var(--mono); font-size:12px; font-weight:500;
  padding:3px 10px; border-radius:6px; background:var(--accent-light);
  color:var(--accent); flex-shrink:0;
}
.result-domain { font-family:var(--mono); font-size:13px; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.result-count { font-size:12px; color:var(--muted); flex-shrink:0; }

.result-body { padding:0; }

.record-row {
  display:grid; align-items:start; gap:12px;
  padding:12px 18px; border-bottom:1px solid var(--border);
  font-size:13px;
  transition:background .12s;
}
.record-row:last-child { border-bottom:none; }
.record-row:hover { background:var(--surface2); }

/* column layouts per type */
.record-row.type-a, .record-row.type-aaaa   { grid-template-columns:1fr 80px; }
.record-row.type-mx                          { grid-template-columns:40px 1fr 80px; }
.record-row.type-ns, .record-row.type-cname  { grid-template-columns:1fr 80px; }
.record-row.type-txt                         { grid-template-columns:1fr; }
.record-row.type-soa                         { grid-template-columns:1fr; }
.record-row.type-srv                         { grid-template-columns:40px 1fr 80px; }
.record-row.type-caa                         { grid-template-columns:40px 1fr 80px; }

.rec-value { font-family:var(--mono); color:var(--text); word-break:break-all; line-height:1.55; }
.rec-ttl { font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; align-self:center; }
.rec-prio { font-family:var(--mono); font-size:12px; color:var(--accent); font-weight:500; align-self:center; }
.rec-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:3px; }

/* copy button */
.rec-copy { background:none; border:none; cursor:pointer; color:var(--muted); font-size:12px; padding:2px 6px; border-radius:4px; transition:all .12s; opacity:0; }
.record-row:hover .rec-copy { opacity:1; }
.rec-copy:hover { background:var(--border); color:var(--text); }
.rec-mono { font-family:var(--mono); }

/* parsed tables for SPF/DMARC/DKIM */
.parsed-table { display:flex; flex-direction:column; gap:3px; }
.parsed-row { display:flex; align-items:baseline; gap:10px; padding:5px 8px; border-radius:6px; background:var(--surface2); }
.parsed-key { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); min-width:120px; flex-shrink:0; }
.parsed-val { font-size:13px; color:var(--text2); font-family:var(--mono); flex:1; word-break:break-all; }
.parsed-ok   .parsed-key, .parsed-ok   .parsed-val { color:var(--green); }
.parsed-ok   { background:var(--green-bg); }
.parsed-warn .parsed-key, .parsed-warn .parsed-val { color:#b8860b; }
.parsed-warn { background:rgba(184,134,11,.08); }
body.dark .parsed-warn { background:rgba(184,134,11,.12); }
.parsed-neutral .parsed-val { color:var(--amber); }

/* states */
.state-loading { display:flex; align-items:center; gap:12px; padding:24px 20px; color:var(--muted); font-size:14px; }
.spinner { width:18px; height:18px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }

.state-empty { padding:28px 20px; text-align:center; color:var(--muted); font-size:13.5px; }
.state-empty .empty-icon { font-size:28px; opacity:.4; margin-bottom:8px; }

.state-error { padding:16px 18px; background:rgba(192,57,43,.07); border-left:3px solid #c0392b; margin:12px; border-radius:8px; font-size:13px; color:#c0392b; }

/* history */
.history-row { display:flex; align-items:center; gap:8px; margin-top:14px; flex-wrap:wrap; }
.history-label { font-size:12px; color:var(--muted); font-weight:600; flex-shrink:0; }
.history-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 6px 4px 11px; border-radius:20px; background:var(--surface2); border:1px solid var(--border); font-family:var(--mono); font-size:12px; color:var(--text2); cursor:pointer; transition:all .15s; }
.history-chip:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
.history-chip.pinned { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
.chip-label { cursor:pointer; }
.chip-pin { background:none; border:none; cursor:pointer; font-size:11px; padding:0 3px; opacity:.5; transition:opacity .15s; color:inherit; line-height:1; }
.chip-pin:hover { opacity:1; }

@media(max-width:600px) {
  header { padding:16px 20px; }
  main { padding:32px 20px 80px; }
  .input-row { flex-direction:column; }
  .record-row.type-mx, .record-row.type-srv, .record-row.type-caa { grid-template-columns:1fr; }
}

  /* ── NAV DROPDOWN ── */
  .nav-wrap { position:relative; z-index:100; }
  .nav-trigger {
    display:inline-flex; align-items:center; gap:8px;
    padding:8px 14px; border-radius:9px;
    border:1px solid var(--border2); background:var(--surface2);
    color:var(--text2); font-size:13px; font-weight:600;
    cursor:pointer; transition:all .15s; font-family:'Plus Jakarta Sans',sans-serif;
    user-select:none;
  }
  .nav-trigger:hover, .nav-trigger.open { border-color:var(--accent); color:var(--accent); background:var(--accent-light); }
  .nav-trigger-chevron { font-size:9px; opacity:.6; transition:transform .2s; }
  .nav-trigger.open .nav-trigger-chevron { transform:rotate(180deg); }
  .nav-dropdown {
    position:absolute; top:calc(100% + 8px); left:0;
    background:var(--surface); border:1px solid var(--border2);
    border-radius:13px; box-shadow:0 8px 32px var(--shadow-lg);
    min-width:200px; z-index:200; overflow:hidden;
    opacity:0; pointer-events:none;
    transform:translateY(-6px) scale(.98);
    transition:opacity .18s, transform .18s;
    transform-origin:top left;
  }
  .nav-dropdown.open { opacity:1; pointer-events:all; transform:translateY(0) scale(1); }
  .nav-section-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:10px 14px 4px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:9px 14px; color:var(--text2); text-decoration:none; font-size:13.5px; font-weight:500; transition:background .12s,color .12s; }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { color:var(--accent); background:var(--accent-light); font-weight:600; }
  .nav-item-icon { font-size:15px; width:20px; text-align:center; flex-shrink:0; }

</style>
</head>
<body>

<header>
  <a class="logo" href="index.html"><span class="logo-dot"></span>home.</a>
  <div class="header-right">
    <div class="nav-wrap" id="navWrap">
  <button class="nav-trigger" id="navTrigger" onclick="toggleNav()">
    ☰ Menu <span class="nav-trigger-chevron">▼</span>
  </button>
  <div class="nav-dropdown" id="navDropdown">
    <div class="nav-section-label">Pages</div>
    <a class="nav-item" href="index.html"><span class="nav-item-icon">🏠</span>home.</a><a class="nav-item" href="reports.html"><span class="nav-item-icon">📊</span>Reports</a><a class="nav-item" href="clients.html"><span class="nav-item-icon">🏢</span>Clients</a><a class="nav-item active" href="dns.html"><span class="nav-item-icon">🔍</span>DNS Lookup</a>
  </div>
</div>
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
  </div>
</header>

<main>
  <div class="page-title">DNS <em>Lookup</em></div>
  <div class="page-sub">Query DNS records for any domain using Cloudflare's public DNS resolver.</div>

  <div class="search-card">
    <div class="input-row">
      <input class="domain-input" id="domainInput" type="text" placeholder="Enter a domain — e.g. example.com"
        onkeydown="if(event.key==='Enter') lookupActive()"
        oninput="onDomainInput(this.value)">
      <button class="lookup-btn" id="lookupBtn" onclick="lookupActive()" disabled>Lookup</button>
    </div>

    <div class="record-types" id="recordTypes">
      <!-- rendered by JS -->
    </div>

    <div class="history-row" id="historyRow" style="display:none">
      <span class="history-label">Recent:</span>
      <div id="historyChips"></div>
    </div>
  </div>

  <div class="results-area" id="resultsArea"></div>
</main>

<script>
// ── CONFIG ──
const DNS_API = 'https://cloudflare-dns.com/dns-query';

const RECORD_TYPES = [
  { type:'A',     label:'A',     desc:'IPv4 address',         icon:'🔵' },
  { type:'AAAA',  label:'AAAA',  desc:'IPv6 address',         icon:'🟣' },
  { type:'MX',    label:'MX',    desc:'Mail servers',         icon:'📧' },
  { type:'NS',    label:'NS',    desc:'Nameservers',          icon:'🌐' },
  { type:'CNAME', label:'CNAME', desc:'Canonical name alias', icon:'🔀' },
  { type:'TXT',   label:'TXT',   desc:'All text records',     icon:'📄' },
  { type:'SOA',   label:'SOA',   desc:'Start of authority',   icon:'🏛' },
  { type:'SRV',   label:'SRV',   desc:'Service locator',      icon:'⚙️' },
  { type:'CAA',   label:'CAA',   desc:'Cert authority',       icon:'🔒' },
  { type:'SPF',   label:'SPF',   desc:'Sender Policy Framework — who can send email for this domain', icon:'✉️', pseudo:true },
  { type:'DMARC', label:'DMARC', desc:'Domain-based Message Authentication — email policy', icon:'🛡', pseudo:true },
  { type:'DKIM',  label:'DKIM',  desc:'DomainKeys Identified Mail — requires a selector', icon:'🔑', pseudo:true },
];

// Active record types — none selected by default
let activeTypes = new Set([]);
let history     = JSON.parse(localStorage.getItem('dns_history') || '[]').slice(0, 3);
let pinned      = JSON.parse(localStorage.getItem('dns_pinned')  || '[]');
let lastDomain  = '';

// ── INIT ──
function init() {
  renderTypeButtons();
  renderHistory();
  applyDark();
}

// ── TYPE BUTTONS ──
function renderTypeButtons() {
  const wrap = document.getElementById('recordTypes');
  wrap.innerHTML = RECORD_TYPES.map(rt => `
    <button class="type-btn${activeTypes.has(rt.type)?' active':''}"
      onclick="toggleType('${rt.type}')"
      title="${rt.desc}">
      <span>${rt.icon}</span> ${rt.label}
    </button>`).join('');
}

function toggleType(type) {
  if (activeTypes.has(type)) {
    activeTypes.delete(type);
  } else {
    activeTypes.add(type);
  }
  renderTypeButtons();
  if (lastDomain) runLookup(lastDomain);
}

// ── INPUT ──
function onDomainInput(val) {
  const clean = val.trim().replace(/^https?:\/\//,'').replace(/\/.*$/,'');
  document.getElementById('lookupBtn').disabled = !clean;
}

function lookupActive() {
  const raw   = document.getElementById('domainInput').value.trim();
  const domain = raw.replace(/^https?:\/\//,'').replace(/\/.*$/,'').toLowerCase();
  if (!domain) return;
  document.getElementById('domainInput').value = domain;
  runLookup(domain);
}

// ── LOOKUP ──
// Common DKIM selectors to probe automatically
const DKIM_SELECTORS = [
  'google','default','selector1','selector2','dkim','mail','k1','k2',
  'smtp','email','mimecast','mailjet','sendgrid','amazonses','mandrill',
  'protonmail','zoho','outlook','s1','s2','key1','key2','dkim1','dkim2',
  'sig1','20161025','20210112','20230601'
];

function resolveQuery(type, domain) {
  switch(type) {
    case 'SPF':   return [{ queryName: domain,             queryType: 'TXT', label: 'SPF'   }];
    case 'DMARC': return [{ queryName: `_dmarc.${domain}`, queryType: 'TXT', label: 'DMARC' }];
    case 'DKIM':  return DKIM_SELECTORS.map(sel => ({ queryName: `${sel}._domainkey.${domain}`, queryType: 'TXT', label: sel, selector: sel }));
    default:      return [{ queryName: domain,             queryType: type,  label: type    }];
  }
}

async function runLookup(domain) {
  lastDomain = domain;
  addHistory(domain);

  const resultsArea = document.getElementById('resultsArea');
  resultsArea.innerHTML = '';

  const types = [...activeTypes];
  if (!types.length) {
    resultsArea.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:14px">Select one or more record types above to look up.</div>';
    return;
  }

  // Create one result card per type
  const cards = {};
  types.forEach((type, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = `${i * 0.04}s`;
    card.id = `result_${type}`;
    const displayLabel = type === 'DKIM' ? 'DKIM' : resolveQuery(type, domain)[0].label;
    const displayDomain = type === 'DKIM' ? `*._domainkey.${domain}` : resolveQuery(type, domain)[0].queryName;
    card.innerHTML = `
      <div class="result-header">
        <span class="result-type-badge">${displayLabel}</span>
        <span class="result-domain">${displayDomain}</span>
      </div>
      <div class="result-body">
        <div class="state-loading"><div class="spinner"></div> ${type === 'DKIM' ? `Probing ${DKIM_SELECTORS.length} common selectors…` : 'Querying…'}</div>
      </div>`;
    resultsArea.appendChild(card);
    cards[type] = card;
  });

  await Promise.all(types.map(async type => {
    const card = cards[type];

    if (type === 'DKIM') {
      // Probe all selectors in parallel, collect hits
      const queries = resolveQuery('DKIM', domain);
      const results = await Promise.all(queries.map(async q => {
        try {
          const res = await fetch(`${DNS_API}?name=${encodeURIComponent(q.queryName)}&type=TXT`, {
            headers: { 'Accept': 'application/dns-json' }
          });
          if (!res.ok) return null;
          const json = await res.json();
          const answers = (json.Answer || []).filter(a => String(a.data).includes('v=DKIM1') || String(a.data).includes('k='));
          if (!answers.length) return null;
          return { selector: q.selector, answers };
        } catch { return null; }
      }));

      const hits = results.filter(Boolean);
      const body = card.querySelector('.result-body');
      const header = card.querySelector('.result-header');
      const countEl = document.createElement('span');
      countEl.className = 'result-count';
      countEl.textContent = hits.length ? `${hits.length} selector${hits.length!==1?'s':''} found` : 'No selectors found';
      header.appendChild(countEl);

      if (!hits.length) {
        body.innerHTML = `<div class="state-empty"><div class="empty-icon">∅</div>No DKIM records found — tried ${DKIM_SELECTORS.length} common selectors</div>`;
        return;
      }

      body.innerHTML = hits.map(hit => {
        return hit.answers.map(rec => {
          const raw = String(rec.data).replace(/^"|"$/g,'').replace(/" "/g,'');
          const parts = raw.split(/\s*;\s*/);
          const tags = parts.filter(Boolean).map(p => {
            const [k, ...rest] = p.split('=');
            const v = rest.join('=');
            const KEY = (k||'').trim().toLowerCase();
            const VAL = (v||'').trim();
            const labels = { 'v':['Version',VAL], 'k':['Key type',VAL], 'p':['Public key', VAL.length>40?VAL.slice(0,40)+'…':VAL], 'h':['Hash algo',VAL], 's':['Service',VAL], 't':['Flags',VAL], 'n':['Notes',VAL] };
            const [label, display] = labels[KEY] || [KEY, VAL];
            return `<div class="parsed-row"><span class="parsed-key">${esc(label)}</span><span class="parsed-val rec-mono" style="word-break:break-all">${esc(display)}</span></div>`;
          }).join('');
          return `<div class="record-row type-txt" style="flex-direction:column;gap:0">
            <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px">
              <span style="font-family:var(--mono);font-size:12px;font-weight:600;background:var(--accent-light);color:var(--accent);padding:2px 9px;border-radius:6px">${esc(hit.selector)}</span>
              <span style="font-size:11px;color:var(--muted)">${esc(hit.selector)}._domainkey.${esc(domain)}</span>
              <button class="rec-copy" onclick="copyVal('${esc(raw)}')" title="Copy raw" style="opacity:1">⎘</button>
            </div>
            <div class="parsed-table">${tags}</div>
          </div>`;
        }).join('');
      }).join('');
      return;
    }

    // Standard types
    const queries = resolveQuery(type, domain);
    const { queryName, queryType, label } = queries[0];
    try {
      const res  = await fetch(`${DNS_API}?name=${encodeURIComponent(queryName)}&type=${queryType}`, {
        headers: { 'Accept': 'application/dns-json' }
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      renderResult(card, type, queryName, json);
    } catch(err) {
      card.querySelector('.result-body').innerHTML =
        `<div class="state-error">⚠ Could not fetch ${label} records — ${err.message}</div>`;
    }
  }));
}

// ── RENDER RESULT ──
function renderResult(card, type, queryName, json) {
  const answers = json.Answer || [];
  const body    = card.querySelector('.result-body');
  const header  = card.querySelector('.result-header');

  const countEl = header.querySelector('.result-count') || document.createElement('span');
  countEl.className = 'result-count';
  countEl.textContent = answers.length ? `${answers.length} record${answers.length!==1?'s':''}` : 'No records';
  if (!header.querySelector('.result-count')) header.appendChild(countEl);

  if (!answers.length) {
    const noRecMsg = type === 'DMARC' ? `No DMARC record found at ${queryName}` :
                     type === 'DKIM'  ? `No DKIM record found — try a different selector` :
                     type === 'SPF'   ? `No SPF record found for this domain` :
                     `No ${type} records found for ${queryName}`;
    body.innerHTML = `<div class="state-empty"><div class="empty-icon">∅</div>${noRecMsg}</div>`;
    return;
  }

  // For pseudo-types, filter to only relevant records
  let filtered = answers;
  if (type === 'SPF') {
    filtered = answers.filter(r => String(r.data).includes('v=spf1'));
    if (!filtered.length) {
      body.innerHTML = `<div class="state-empty"><div class="empty-icon">∅</div>No SPF record found (no TXT record starting with v=spf1)</div>`;
      return;
    }
  }
  if (type === 'DMARC' || type === 'DKIM') {
    filtered = answers.filter(r => String(r.data).length > 0);
  }

  body.innerHTML = filtered.map(rec => renderRecord(type, rec)).join('');
}

function fmtTTL(ttl) {
  if (!ttl) return '';
  if (ttl < 60)   return `${ttl}s`;
  if (ttl < 3600) return `${Math.round(ttl/60)}m`;
  return `${Math.round(ttl/3600)}h`;
}

function copyVal(val) {
  navigator.clipboard.writeText(val).catch(() => {});
}

function renderRecord(type, rec) {
  const data = String(rec.data || '').trim();
  const ttl  = fmtTTL(rec.TTL);
  const cls  = `record-row type-${type.toLowerCase()}`;

  switch(type) {
    case 'A':
    case 'AAAA':
      return `<div class="${cls}">
        <span class="rec-value">${esc(data)} <button class="rec-copy" onclick="copyVal('${esc(data)}')" title="Copy">⎘</button></span>
        <span class="rec-ttl">${ttl}</span>
      </div>`;

    case 'MX': {
      const parts = data.split(' ');
      const prio  = parts[0] || '';
      const host  = parts.slice(1).join(' ') || data;
      return `<div class="${cls}">
        <span class="rec-prio">${esc(prio)}</span>
        <span class="rec-value">${esc(host)} <button class="rec-copy" onclick="copyVal('${esc(host)}')" title="Copy">⎘</button></span>
        <span class="rec-ttl">${ttl}</span>
      </div>`;
    }

    case 'NS':
    case 'CNAME':
      return `<div class="${cls}">
        <span class="rec-value">${esc(data)} <button class="rec-copy" onclick="copyVal('${esc(data)}')" title="Copy">⎘</button></span>
        <span class="rec-ttl">${ttl}</span>
      </div>`;

    case 'TXT': {
      const clean = data.replace(/^"|"$/g,'').replace(/" "/g,'');
      return `<div class="${cls}">
        <div>
          <div class="rec-value">${esc(clean)} <button class="rec-copy" onclick="copyVal('${esc(clean)}')" title="Copy">⎘</button></div>
          <div class="rec-ttl" style="text-align:left;margin-top:4px">${ttl}</div>
        </div>
      </div>`;
    }

    case 'SOA': {
      const parts   = data.split(' ');
      const fields  = ['Primary NS','Responsible','Serial','Refresh','Retry','Expire','Min TTL'];
      const rows    = parts.map((v,i) => `<div style="display:flex;gap:12px;padding:4px 0;border-bottom:1px solid var(--border)"><span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;min-width:110px">${fields[i]||'—'}</span><span class="rec-value">${esc(v)}</span></div>`).join('');
      return `<div class="${cls}"><div style="width:100%">${rows}</div></div>`;
    }

    case 'SRV': {
      const parts = data.split(' ');
      const prio  = parts[0] || '';
      const rest  = parts.slice(1).join(' ');
      return `<div class="${cls}">
        <span class="rec-prio">${esc(prio)}</span>
        <span class="rec-value">${esc(rest)} <button class="rec-copy" onclick="copyVal('${esc(rest)}')" title="Copy">⎘</button></span>
        <span class="rec-ttl">${ttl}</span>
      </div>`;
    }

    case 'CAA': {
      const parts = data.split(' ');
      const flag  = parts[0] || '';
      const rest  = parts.slice(1).join(' ');
      return `<div class="${cls}">
        <span class="rec-prio">${esc(flag)}</span>
        <span class="rec-value">${esc(rest)} <button class="rec-copy" onclick="copyVal('${esc(rest)}')" title="Copy">⎘</button></span>
        <span class="rec-ttl">${ttl}</span>
      </div>`;
    }

    default: {
      // ── SPF ──
      if (type === 'SPF') {
        const raw   = data.replace(/^"|"$/g,'').replace(/" "/g,'');
        const parts = raw.split(/\s+/);
        const tags  = parts.map(p => {
          if (p === 'v=spf1') return `<div class="parsed-row"><span class="parsed-key">version</span><span class="parsed-val">SPF1</span></div>`;
          if (p === '+all'||p==='all')  return `<div class="parsed-row parsed-warn"><span class="parsed-key">all</span><span class="parsed-val">⚠ Allow all — very permissive</span></div>`;
          if (p === '-all')  return `<div class="parsed-row parsed-ok"><span class="parsed-key">all</span><span class="parsed-val">✓ Hard fail — strict</span></div>`;
          if (p === '~all')  return `<div class="parsed-row parsed-neutral"><span class="parsed-key">all</span><span class="parsed-val">~ Soft fail</span></div>`;
          if (p === '?all')  return `<div class="parsed-row parsed-neutral"><span class="parsed-key">all</span><span class="parsed-val">? Neutral</span></div>`;
          if (p.startsWith('include:')) return `<div class="parsed-row"><span class="parsed-key">include</span><span class="parsed-val rec-mono">${esc(p.slice(8))}</span></div>`;
          if (p.startsWith('ip4:'))    return `<div class="parsed-row"><span class="parsed-key">ip4</span><span class="parsed-val rec-mono">${esc(p.slice(4))}</span></div>`;
          if (p.startsWith('ip6:'))    return `<div class="parsed-row"><span class="parsed-key">ip6</span><span class="parsed-val rec-mono">${esc(p.slice(4))}</span></div>`;
          if (p.startsWith('a:'))      return `<div class="parsed-row"><span class="parsed-key">a</span><span class="parsed-val rec-mono">${esc(p.slice(2))}</span></div>`;
          if (p === 'a')               return `<div class="parsed-row"><span class="parsed-key">a</span><span class="parsed-val">domain A record</span></div>`;
          if (p.startsWith('mx:'))     return `<div class="parsed-row"><span class="parsed-key">mx</span><span class="parsed-val rec-mono">${esc(p.slice(3))}</span></div>`;
          if (p === 'mx')              return `<div class="parsed-row"><span class="parsed-key">mx</span><span class="parsed-val">domain MX records</span></div>`;
          if (p.startsWith('redirect=')) return `<div class="parsed-row"><span class="parsed-key">redirect</span><span class="parsed-val rec-mono">${esc(p.slice(9))}</span></div>`;
          return `<div class="parsed-row"><span class="parsed-key">other</span><span class="parsed-val rec-mono">${esc(p)}</span></div>`;
        }).join('');
        return `<div class="record-row type-txt" style="flex-direction:column;gap:0">
          <div style="margin-bottom:10px">
            <div class="rec-label" style="margin-bottom:6px">Raw</div>
            <div class="rec-value rec-mono" style="word-break:break-all">${esc(raw)} <button class="rec-copy" onclick="copyVal('${esc(raw)}')" title="Copy">⎘</button></div>
          </div>
          <div class="rec-label" style="margin-bottom:6px">Parsed</div>
          <div class="parsed-table">${tags}</div>
        </div>`;
      }

      // ── DMARC ──
      if (type === 'DMARC') {
        const raw   = data.replace(/^"|"$/g,'').replace(/" "/g,'');
        const parts = raw.split(/\s*;\s*/);
        const tags  = parts.filter(Boolean).map(p => {
          const [k, ...rest] = p.split('=');
          const v = rest.join('=');
          const KEY = (k||'').trim().toLowerCase();
          const VAL = (v||'').trim();
          const labels = {
            'v':       ['Version',           VAL],
            'p':       ['Policy',            VAL === 'none' ? '⚠ none — monitoring only' : VAL === 'quarantine' ? '~ quarantine' : VAL === 'reject' ? '✓ reject — strict' : VAL],
            'sp':      ['Subdomain policy',  VAL],
            'rua':     ['Aggregate reports', VAL],
            'ruf':     ['Forensic reports',  VAL],
            'pct':     ['Percentage',        `${VAL}% of messages`],
            'adkim':   ['DKIM alignment',    VAL === 's' ? 'strict' : 'relaxed'],
            'aspf':    ['SPF alignment',     VAL === 's' ? 'strict' : 'relaxed'],
            'fo':      ['Failure options',   VAL],
            'rf':      ['Report format',     VAL],
            'ri':      ['Report interval',   `${VAL}s`],
          };
          const [label, display] = labels[KEY] || [KEY, VAL];
          const cls = display.startsWith('⚠') ? ' parsed-warn' : display.startsWith('✓') ? ' parsed-ok' : display.startsWith('~') ? ' parsed-neutral' : '';
          return `<div class="parsed-row${cls}"><span class="parsed-key">${esc(label)}</span><span class="parsed-val">${esc(display)}</span></div>`;
        }).join('');
        return `<div class="record-row type-txt" style="flex-direction:column;gap:0">
          <div style="margin-bottom:10px">
            <div class="rec-label" style="margin-bottom:6px">Raw</div>
            <div class="rec-value rec-mono" style="word-break:break-all">${esc(raw)} <button class="rec-copy" onclick="copyVal('${esc(raw)}')" title="Copy">⎘</button></div>
          </div>
          <div class="rec-label" style="margin-bottom:6px">Parsed</div>
          <div class="parsed-table">${tags}</div>
        </div>`;
      }

      // ── DKIM ──
      if (type === 'DKIM') {
        const raw   = data.replace(/^"|"$/g,'').replace(/" "/g,'');
        const parts = raw.split(/\s*;\s*/);
        const tags  = parts.filter(Boolean).map(p => {
          const [k, ...rest] = p.split('=');
          const v = rest.join('=');
          const KEY = (k||'').trim().toLowerCase();
          const VAL = (v||'').trim();
          const labels = {
            'v':  ['Version',    VAL],
            'k':  ['Key type',   VAL],
            'p':  ['Public key', VAL.length > 40 ? VAL.slice(0,40)+'…' : VAL],
            'h':  ['Hash algo',  VAL],
            's':  ['Service',    VAL],
            't':  ['Flags',      VAL],
            'n':  ['Notes',      VAL],
          };
          const [label, display] = labels[KEY] || [KEY, VAL];
          return `<div class="parsed-row"><span class="parsed-key">${esc(label)}</span><span class="parsed-val rec-mono" style="word-break:break-all">${esc(display)}</span></div>`;
        }).join('');
        return `<div class="record-row type-txt" style="flex-direction:column;gap:0">
          <div style="margin-bottom:10px">
            <div class="rec-label" style="margin-bottom:6px">Raw</div>
            <div class="rec-value rec-mono" style="word-break:break-all;font-size:12px">${esc(raw)} <button class="rec-copy" onclick="copyVal('${esc(raw)}')" title="Copy">⎘</button></div>
          </div>
          <div class="rec-label" style="margin-bottom:6px">Parsed</div>
          <div class="parsed-table">${tags}</div>
        </div>`;
      }

      return `<div class="${cls}"><span class="rec-value">${esc(data)}</span><span class="rec-ttl">${ttl}</span></div>`;
    }
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── HISTORY ──
function addHistory(domain) {
  // Don't add to recent if already pinned
  if (!pinned.includes(domain)) {
    history = [domain, ...history.filter(d => d !== domain)].slice(0, 3);
    localStorage.setItem('dns_history', JSON.stringify(history));
  }
  renderHistory();
}

function togglePin(domain) {
  if (pinned.includes(domain)) {
    pinned = pinned.filter(d => d !== domain);
  } else {
    pinned = [...pinned, domain];
    // Remove from recent since it's now pinned
    history = history.filter(d => d !== domain);
    localStorage.setItem('dns_history', JSON.stringify(history));
  }
  localStorage.setItem('dns_pinned', JSON.stringify(pinned));
  renderHistory();
}

function renderHistory() {
  const row   = document.getElementById('historyRow');
  const chips = document.getElementById('historyChips');
  const all   = [...pinned, ...history.filter(d => !pinned.includes(d))];
  if (!all.length) { row.style.display='none'; return; }
  row.style.display = 'flex';

  chips.innerHTML = all.map(d => {
    const isPinned = pinned.includes(d);
    return `<span class="history-chip${isPinned?' pinned':''}">
      <span class="chip-label" onclick="useDomain('${esc(d)}')">${esc(d)}</span>
      <button class="chip-pin" onclick="togglePin('${esc(d)}')" title="${isPinned?'Unpin':'Pin'}">${isPinned?'📌':'📍'}</button>
    </span>`;
  }).join('');
}

function useDomain(domain) {
  document.getElementById('domainInput').value = domain;
  document.getElementById('lookupBtn').disabled = false;
  runLookup(domain);
}

// ── DARK MODE ──
let darkMode = localStorage.getItem('chub-dark') === '1';
function applyDark() { document.body.classList.toggle('dark', darkMode); document.getElementById('darkBtn').textContent = darkMode ? '☀️' : '🌙'; }
function toggleDark() { darkMode = !darkMode; localStorage.setItem('chub-dark', darkMode?'1':'0'); applyDark(); }


function toggleNav(){
  const t=document.getElementById('navTrigger'), d=document.getElementById('navDropdown');
  const open=d.classList.toggle('open'); t.classList.toggle('open',open);
}
document.addEventListener('click',function(e){
  const w=document.getElementById('navWrap');
  if(w&&!w.contains(e.target)){document.getElementById('navDropdown').classList.remove('open');document.getElementById('navTrigger').classList.remove('open');}
});

init();
</script>
